<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            position: relative;
        }

        .box {
            height: 20vh;
            width: 20vh;
            position: absolute;
            text-align: center;
            line-height: 20vh;
            color: white;
            font-weight: bold;
        }

        #box1 { 
            background-color: red;
            top: 0px;
            left: 0px;
        }

        #box2 { 
            background-color: black;
            top: 0px;
            right: 0px;
            color: black;
        }

        #box3 { 
            background-color: green;
            bottom: 0px;
            right: 0px;
        }

        #box4 { 
            background-color: palevioletred;
            bottom: 0px;
            left: 0px;
        }

        #box5 { 
            background-color: blue;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="box1" class="box">1</div>
    <div id="box2" class="box">2</div>
    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
</body>
</html>
