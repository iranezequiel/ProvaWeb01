<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <style>
        
        *{margin: 0px; padding: 0px; box-sizing: border-box;}
        body{ height: 100vh;}
    
        .box{ border: 50vh;
        box-sizing:  border-box;
        height: 20vh;
        width: 25vw;
        display: inline-block;
        text-align: center;
        line-height: 25vh;
    }

        #box1{background-color: purple;}
        #box2{background-color: red;}
        #box3{background-color: green;}
        #box4{background-color: blue;}
    </style>
</head>
<body>
    <div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>

</body>
</html>
