<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 3 - Lista de Usuários</title>
    <style>
        
        body {
            background-color: #a0a0a0;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        
        .card {
            background-color: white;
            width: 350px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

      
        .linha-usuario {
            display: flex;           
            align-items: center;    
            padding: 15px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        
        .linha-usuario:last-child {
            border-bottom: none;
        }

       
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;    
            margin-right: 15px;
            object-fit: cover;
        }

   
        .info h3 {
            margin: 0;
            font-size: 16px;
        }

        .info p {
            margin: 4px 0 0 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="linha-usuario">
            <img src="imagemAividade3/imagem1.jpg" alt="Foto" class="avatar">
            <div class="info">
                <h3>Renata</h3>
                <p>6765 Seguidores</p>
            </div>
        </div>

        <div class="linha-usuario">
            <img src="imagemAividade3/imagem2.jpg"Foto" class="avatar">
            <div class="info">
                <h3>Zé de lá</h3>
                <p>2420 Seguidores</p>
            </div>
        </div>

        <div class="linha-usuario">
            <img src="imagemAividade3/heman.jpg" alt="Foto" class="avatar">
            <div class="info">
                <h3>Heman</h3>
                <p>6727 Seguidores</p>
            </div>
        </div>

        <div class="linha-usuario">
            <img src="imagemAividade3/monica.jpg" alt="Foto" class="avatar">
            <div class="info">
                <h3>Monica</h3>
                <p>6685 Seguidores </p>
            </div>
        </div>
    </div>

</body>
</html>
