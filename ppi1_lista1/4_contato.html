<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
</head>

<body>

    <h1>Entre em Contato</h1>

    <p>Preencha o formulário abaixo para entrar em contato.</p>

    <hr>

    <form>

        <!-- Nome -->
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        <br><br>

        <!-- Email -->
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
        <br><br>

        <!-- Assunto -->
        <label for="assunto">Assunto:</label><br>
        <input type="text" id="assunto" name="assunto" placeholder="Assunto da mensagem">
        <br><br>

        <!-- Estado -->
        <label for="estado">Estado:</label><br>
        <select id="estado" name="estado">
            <option value="">Selecione</option>
            <option>SC</option>
            <option>PR</option>
            <option>RS</option>
            <option>SP</option>
            <option>RJ</option>
            <option>MG</option>
        </select>
        <br><br>

        <!-- Mensagem -->
        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem"></textarea>
        <br><br>

        <!-- Botão -->
        <button type="submit">Enviar</button>

    </form>

    <hr>

    <!-- Link de volta -->
    <p>
        <a href="4_curriculo.html">Voltar para o currículo</a>
    </p>

</body>
</html>
