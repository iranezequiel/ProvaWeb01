<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{border: 1px solid red;margin: 0px;padding: 0px}
        .box{
            width: 100px; 
            height: 100px;
            border-color: black;
            display: inline-block;
        }

        #box1{background-color: hotpink;
            position: relative;
            top: 100px;
            left: 150px;
        }
        #box2{background-color: blue;
            position: static;
            top:200px;
            
        }
        #box3{background-color: red;
            position: absolute;
            top: 5px;
            left: 5px;

        }
        #box4{background-color: yellow;
            position: fixed;
            bottom: 0px;
            right: 0px;
        }
        #box5{background-color: green;
        
        }
        span:last-child{background-color: aquamarine;
        
        }
        #container{position: relative;
        border-color: blueviolet;
        border-width: 10px;
    }
            
    </style>
</head>
<body>

    <div style="height: 100px;">

    </div>
    <div id="container">

        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>

    </div>
    
</body>
</html>
