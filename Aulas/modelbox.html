<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coisas</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: gray;
            border-top-color: blue;
            border-top-width: 10px;
            border-top-style: solid;

            border-top: 10px solid red;
            border-right: 10px solid rgb(100, 200, 240);
            border-bottom: 10px solid rgb(148, 163, 16);
            border-left: 10px solid orange;
            border-radius: 10% 20% 30% 50%;
            margin: 10px;

            outline: 5px dotted crimson;
            outline-offset: 10px;
        }


    </style>
</head>
<body>
    <div class="box">Box</div>
    <div class="box">Box</div>
</body>
</html>
