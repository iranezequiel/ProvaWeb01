<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Centralização Flexbox</title>
    <style>
        body {
            background-color: #2c3e50; /* Fundo colorido */
            margin: 0;
            height: 100vh; /* Ocupa toda a altura da tela */
            display: flex; /* Ativa o Flexbox */
            justify-content: center; /* Centraliza na horizontal */
            align-items: center; /* Centraliza na vertical */
        }
        .foguete {
            font-size: 80px;
        }
    </style>
</head>
<body>
    <div class="foguete">🚀</div>
</body>
</html>
