<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Exemplo CSS</title>

<style>

/* Regra CSS básica */
button {
  background-color: blue;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}

/* Pseudo-classe (:hover) */
button:hover {
  animation: mudarCor 0.5s forwards;
}

/* Pseudo-elemento (::before) */
button::before {
  content: "👉 ";
}

/* Animação */
@keyframes mudarCor {
  from {
    background-color: rgb(14, 146, 91);
  }
  to {
    background-color: rgb(186, 189, 9);
  }
}

</style>
</head>
<body>

<header>
  <h1>Exemplo de CSS</h1>
</header>

<main>
  <button>Precione meu botâo</button>
</main>

<footer>
  <p>fim</p>
</footer>

</body>
</html>
