<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Centralização Grid</title>
    <style>
        body {
            background-color: #8e44ad; /* Fundo colorido */
            margin: 0;
            height: 100vh;
            display: grid; /* Ativa o Grid */
            place-items: center; /* Atalho para centralizar em ambos os eixos */
        }
        .foguete {
            font-size: 80px;
        }
    </style>
</head>
<body>
    <div class="foguete">🚀</div>
</body>
</html>
